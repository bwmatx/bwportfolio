<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penghitung Poin Multiplayer</title>
    <style>
        /* === BASE STYLES & VARIABLES === */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --danger-light: #fee2e2;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        h1, h2, h3 {
            margin-top: 0;
            text-align: center;
            color: #111827;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* === FORM & INPUTS === */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { background-color: var(--primary-hover); transform: scale(0.98); }
        button.danger { background-color: var(--danger); margin-top: 10px; }
        button.danger:active { background-color: var(--danger-hover); }
        button.secondary { background-color: #64748b; margin-top: 10px; }
        button.secondary:active { background-color: #475569; }
        
        button.outline-dashed {
            background-color: #f3f4f6;
            color: #4b5563;
            border: 2px dashed #9ca3af;
            box-shadow: none;
        }
        button.outline-dashed:active { background-color: #e5e7eb; }

        /* === GAME BOARD === */
        .board-header {
            display: flex;
            background: rgba(249, 250, 251, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 15px 0;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            gap: 5px;
            
            position: -webkit-sticky;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .player-col {
            flex: 1;
            text-align: center;
            border-right: 1px solid var(--border);
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .player-col:last-child { border-right: none; }
        .player-col.is-lowest { background-color: #fff1f2; border: 1px solid #fda4af; }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
            border: 2px solid #d1d5db;
            background-color: #e5e7eb;
        }
        .is-lowest .player-avatar { border-color: var(--danger); }

        .player-name { 
            font-size: 13px; 
            font-weight: 700; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 100%;
        }
        .player-score { font-size: 26px; font-weight: 800; margin: 4px 0; }
        .score-change { font-size: 12px; height: 16px; font-weight: bold; margin-bottom: 4px; }
        
        .badge-lowest {
            font-size: 10px;
            background: var(--danger);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: auto;
        }

        /* === HISTORY TABLE === */
        .history-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .history-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
            align-items: center;
        }
        .history-row:last-child { border-bottom: none; }
        .history-index { width: 40px; text-align: center; color: var(--text-muted); font-weight: 600; font-size: 12px; }
        
        .history-val { 
            flex: 1; 
            text-align: center; 
            font-weight: 500; 
            padding: 4px;
            margin: 0 4px;
            border-radius: 6px;
            border: 1px solid transparent;
        }
        .history-val.is-lowest-history { background-color: var(--danger-light); border-color: #fca5a5; }

        .text-green { color: var(--success); }
        .text-red { color: var(--danger); }
        .text-reset { font-size: 10px; color: var(--danger); font-weight: 800; display: block; line-height: 1; margin-top: 2px;}

        /* === GAME INPUT === */
        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .input-row input { text-align: center; font-weight: bold; padding: 10px; font-size: 18px; width: 100%; }

        .streak-banner {
            background: #fef3c7;
            color: #d97706;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid #fde68a;
            display: none;
        }

        .result-table { width: 100%; text-align: left; border-collapse: collapse; margin-bottom: 20px; }
        .result-table th { padding: 12px 10px; background: #f9fafb; border-bottom: 2px solid var(--border); }
        .result-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
        .highlight-win { background-color: #d1fae5; border: 2px solid var(--success) !important; }
        .highlight-lose { background-color: #fee2e2; border: 2px solid var(--danger) !important; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.4s ease-out; }

        /* === CUSTOM MODAL === */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none; /* hidden by default */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 15px;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        @keyframes modalPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-avatar-container {
            margin-bottom: 15px;
            display: none; /* Hidden by default */
        }
        .modal-avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--danger);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .modal-content h3 { margin-top: 0; font-size: 18px; margin-bottom: 8px; }
        .modal-content p { color: #4b5563; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .modal-actions button { width: auto; padding: 10px 18px; font-size: 14px; margin: 0; }
        .modal-btn-cancel { background: #f3f4f6; color: #374151; }
        .modal-btn-cancel:hover { background: #e5e7eb; }
        .modal-btn-cancel:active { background: #d1d5db; }

        /* === JOKER OVERLAY (KOBONG) === */
        .joker-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .joker-content {
            animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .joker-content img {
            max-width: 90vw;
            max-height: 55vh;
            border-radius: 16px;
            box-shadow: none; 
        }
        .joker-content h2 {
            color: #ffffff;
            margin-top: 25px;
            font-size: 26px;
            font-weight: 900;
            text-shadow: 2px 2px 8px #000000;
            text-align: center;
        }
        .joker-btn {
            margin-top: 20px;
            background: var(--danger);
            width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- CUSTOM MODAL UI -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-avatar-box" class="modal-avatar-container">
                <img id="modal-avatar-img" class="modal-avatar-img" src="" alt="Player Avatar">
            </div>
            <h3 id="modal-title">Konfirmasi</h3>
            <p id="modal-message">Pesan dialog</p>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <!-- JOKER KOBONG UI -->
    <div id="joker-overlay" class="joker-overlay">
        <div class="joker-content">
            <img src="https://ik.imagekit.io/bwindonesiaimg/Remi/joker.gif" alt="Joker Kobong">
            <h2 id="joker-text">Selamat Anda Kobong Yoker!</h2>
            <button class="joker-btn" onclick="document.getElementById('joker-overlay').style.display='none'">Tutup</button>
        </div>
    </div>

    <div class="container" id="app"></div>

    <script>
        // === STATE MANAGEMENT ===
        let state = {
            screen: 'setup', 
            setupNames: ["Solebo", "Wondo", "Bowo"], // Default 3 slot dengan nama
            numPlayers: 3,
            players: [], // { id, name, total, minusTotal, avatar, prevTotals: [] }
            matchHistory: [], 
            lowestStreak: { playerId: null, count: 0 },
            endReason: '',
            winner: null,
            loser: null
        };

        const app = document.getElementById('app');

        // === MODAL SYSTEM ===
        function showModal(title, message, type = 'alert', onConfirm = null, avatarUrl = null) {
            const overlay = document.getElementById('modal-overlay');
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-message');
            const actionsEl = document.getElementById('modal-actions');
            const avatarBox = document.getElementById('modal-avatar-box');
            const avatarImg = document.getElementById('modal-avatar-img');

            titleEl.textContent = title;
            msgEl.textContent = message;
            actionsEl.innerHTML = '';

            // Handle Avatar
            if (avatarUrl) {
                avatarImg.src = avatarUrl;
                avatarBox.style.display = 'block';
            } else {
                avatarBox.style.display = 'none';
            }

            if (type === 'alert') {
                const btnOk = document.createElement('button');
                btnOk.type = 'button';
                btnOk.textContent = 'Mengerti';
                btnOk.onclick = () => { closeModal(); if(onConfirm) onConfirm(); };
                actionsEl.appendChild(btnOk);
            } else if (type === 'confirm') {
                const btnCancel = document.createElement('button');
                btnCancel.type = 'button';
                btnCancel.className = 'modal-btn-cancel';
                btnCancel.textContent = 'Batal';
                btnCancel.onclick = () => closeModal();

                const btnOk = document.createElement('button');
                btnOk.type = 'button';
                btnOk.className = 'danger';
                btnOk.textContent = 'Yakin';
                btnOk.onclick = () => { closeModal(); if(onConfirm) onConfirm(); };

                actionsEl.appendChild(btnCancel);
                actionsEl.appendChild(btnOk);
            }

            overlay.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // === RENDER ENGINE ===
        function render() {
            if (state.screen === 'setup') renderSetup();
            else if (state.screen === 'game') renderGame();
            else if (state.screen === 'result') renderResult();
        }

        // === SETUP SCREEN (MODEL ADD PLAYER) ===
        function renderSetup() {
            app.innerHTML = `
                <div class="card">
                    <h1>REMI YOKER</h1>
                    <p class="subtitle">Tambahkan nama pemain (3 - 4 orang)</p>
                    
                    <div id="player-inputs">
                        ${state.setupNames.map((name, i) => `
                            <div class="form-group" style="display: flex; gap: 8px; align-items: center;">
                                <div style="flex: 1;">
                                    <input type="text" id="setup-name-${i}" placeholder="Pemain ${i + 1}" value="${name}">
                                </div>
                                ${i >= 3 ? `<button type="button" class="danger" style="width: auto; padding: 12px 16px; margin: 0; font-size: 14px;" onclick="removeSetupPlayer(${i})">✕</button>` : ''}
                            </div>
                        `).join('')}
                    </div>

                    ${state.setupNames.length < 4 ? `
                        <button type="button" class="outline-dashed" onclick="addSetupPlayer()" style="margin-bottom: 15px;">
                            + Tambah Pemain ke-${state.setupNames.length + 1}
                        </button>
                    ` : ''}

                    <button type="button" onclick="startGame()" style="margin-top: 10px;">Mulai Game</button>
                </div>
            `;
        }

        function getSetupNames() {
            const inputs = document.querySelectorAll('input[id^="setup-name-"]');
            let names = [];
            inputs.forEach(input => names.push(input.value));
            return names;
        }

        function addSetupPlayer() {
            state.setupNames = getSetupNames(); // Simpan input sebelumnya
            if (state.setupNames.length < 4) {
                // Jika slot ke-4 ditambahkan, beri default "Dani"
                let defaultName = state.setupNames.length === 3 ? "Dani" : "";
                state.setupNames.push(defaultName);
                renderSetup();
                // Fokus otomatis ke input yang baru dibuat
                setTimeout(() => {
                    const newInput = document.getElementById(`setup-name-${state.setupNames.length - 1}`);
                    if(newInput) newInput.focus();
                }, 50);
            }
        }

        function removeSetupPlayer(index) {
            state.setupNames = getSetupNames(); // Simpan input sebelumnya
            state.setupNames.splice(index, 1);
            renderSetup();
        }

        function startGame() {
            // Ambil dan filter nama pemain, jika kosong set default "Pemain X"
            let currentNames = getSetupNames();
            let validNames = currentNames.map((n, i) => n.trim() !== "" ? n.trim() : `Pemain ${i+1}`);

            // Dictionary Avatar (Mendeteksi berdasarkan tulisan nama)
            const customAvatars = {
                // Bowo
                "bowo": "https://ik.imagekit.io/bwindonesiaimg/bw", 
                "wibowo": "https://ik.imagekit.io/bwindonesiaimg/bw", 
                "adhi": "https://ik.imagekit.io/bwindonesiaimg/bw", 
                "bw": "https://ik.imagekit.io/bwindonesiaimg/bw", 
                "kentung": "https://ik.imagekit.io/bwindonesiaimg/bw", 
                
                // Solebo
                "solebo": "https://ik.imagekit.io/bwindonesiaimg/solebo", 
                "makrup": "https://ik.imagekit.io/bwindonesiaimg/solebo", 
                "ma'ruf": "https://ik.imagekit.io/bwindonesiaimg/solebo", 
                "kebo": "https://ik.imagekit.io/bwindonesiaimg/solebo", 
                "sekrup": "https://ik.imagekit.io/bwindonesiaimg/solebo",
                "mahrup": "https://ik.imagekit.io/bwindonesiaimg/solebo", 
                
                // Dani
                "dani": "https://ik.imagekit.io/bwindonesiaimg/dani", 
                "dany": "https://ik.imagekit.io/bwindonesiaimg/dani", 
                "danny": "https://ik.imagekit.io/bwindonesiaimg/dani", 
                "dhani": "https://ik.imagekit.io/bwindonesiaimg/dani", 
                
                // Wondo
                "wondo": "https://ik.imagekit.io/bwindonesiaimg/wondo",
                "kaisar wondo": "https://ik.imagekit.io/bwindonesiaimg/wondo",
                "dhimas": "https://ik.imagekit.io/bwindonesiaimg/wondo",
                "aris": "https://ik.imagekit.io/bwindonesiaimg/wondo",
                "ares": "https://ik.imagekit.io/bwindonesiaimg/wondo"
            };

            state.players = [];
            state.numPlayers = validNames.length;

            for (let i = 0; i < state.numPlayers; i++) {
                let name = validNames[i];
                let nameKey = name.toLowerCase(); // Ubah jadi huruf kecil untuk pencocokan dictionary
                
                // Cari apakah nama cocok dengan dictionary, jika tidak pakai inisial UI-Avatar
                let defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff&size=100`;
                let avatarUrl = customAvatars[nameKey] ? customAvatars[nameKey] : defaultAvatar;

                state.players.push({
                    id: i + 1,
                    name: name,
                    avatar: avatarUrl,
                    total: 0,
                    minusTotal: 0,
                    prevTotals: [],
                    prevMinusTotals: []
                });
            }

            state.matchHistory = [];
            state.lowestStreak = { playerId: null, count: 0 };
            state.screen = 'game';
            render();
        }

        // === GAME SCREEN ===
        function renderGame() {
            let showStreak = state.lowestStreak.count >= 5 ? 'block' : 'none';
            let streakPlayerName = state.lowestStreak.playerId 
                ? state.players.find(p => p.id === state.lowestStreak.playerId).name 
                : '';

            let hasPlayed = state.matchHistory.length > 0;

            app.innerHTML = `
                <div class="card" style="padding: 15px;">
                    <h2 style="font-size: 18px; margin-bottom: 15px;">Score Board</h2>
                    <p style="font-size: 12px; font-style: italic; text-align: center;">DI REFRESH ILANG LOO!!!</p>
                    <div class="streak-banner" id="streak-banner-ui" style="display: ${showStreak}">
                        ⚠️ ${streakPlayerName} termendo selama ${state.lowestStreak.count} match berturut-turut!
                    </div>

                    <div class="board-header">
                        ${state.players.map(p => {
                            let isLowestNow = hasPlayed && (p.id === state.lowestStreak.playerId);
                            return `
                            <div class="player-col ${isLowestNow ? 'is-lowest' : ''}">
                                <img src="${p.avatar}" alt="${p.name}" class="player-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=random&color=fff&size=100'">
                                <div class="player-name">${p.name}</div>
                                <div class="player-score" id="score-${p.id}">${p.total}</div>
                                <div class="score-change" id="change-${p.id}"></div>
                                ${isLowestNow ? `<div class="badge-lowest">MENDO</div>` : ''}
                            </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="history-list" id="history-container">
                        ${state.matchHistory.map((m, i) => {
                            return `
                            <div class="history-row">
                                <div class="history-index">#${i+1}</div>
                                ${state.players.map(p => {
                                    let isLowestInHistory = p.id === m.mendoId;
                                    return `
                                    <div class="history-val ${isLowestInHistory ? 'is-lowest-history' : ''}">
                                        <span class="${m.inputs[p.id] > 0 ? 'text-green' : (m.inputs[p.id] < 0 ? 'text-red' : '')}">
                                            ${m.inputs[p.id] > 0 ? '+'+m.inputs[p.id] : m.inputs[p.id]}
                                        </span>
                                        ${m.resets && m.resets.includes(p.id) ? '<span class="text-reset">RESET</span>' : ''}
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                            `;
                        }).join('')}
                        ${!hasPlayed ? '<div style="text-align:center; padding: 20px; color:#9ca3af; font-size:12px;">Belum ada match</div>' : ''}
                    </div>

                    <div class="input-row">
                        ${state.players.map(p => `
                            <div style="flex:1;">
                                <input type="number" id="input-${p.id}" step="5" placeholder="0">
                            </div>
                        `).join('')}
                    </div>

                    <button type="button" onclick="submitMatch()">Submit Match</button>
                    
                    ${hasPlayed ? `<button type="button" class="secondary" onclick="requestDeleteLastMatch()">Hapus Match Terakhir</button>` : ''}
                    
                    <button type="button" class="danger" onclick="requestForceEndGame()">Akhiri Game</button>
                </div>
            `;

            const histContainer = document.getElementById('history-container');
            if (histContainer) histContainer.scrollTop = histContainer.scrollHeight;
        }

        function submitMatch() {
            let inputs = {};
            let isKobongTriggered = false;
            let kobongPlayers = [];

            for (let p of state.players) {
                let valStr = document.getElementById(`input-${p.id}`).value;
                let val = valStr === '' ? 0 : parseInt(valStr);
                
                if (isNaN(val) || val % 5 !== 0) {
                    showModal('Input Tidak Valid', `Poin untuk ${p.name} tidak valid (harus kelipatan 5).`, 'alert');
                    return;
                }
                
                if (val <= -200) {
                    isKobongTriggered = true;
                    kobongPlayers.push(p.name);
                }

                inputs[p.id] = val;
            }

            state.players.forEach(p => {
                p.prevTotals.push(p.total);
                p.prevMinusTotals.push(p.minusTotal);
            });

            let prevMax = Math.max(...state.players.map(p => p.total));
            let prevLeaders = state.players.filter(p => p.total === prevMax);

            for (let p of state.players) {
                p.total += inputs[p.id];
                if (inputs[p.id] < 0) p.minusTotal += Math.abs(inputs[p.id]);
            }

            let resetsThisMatch = [];
            if (prevMax >= 500) {
                let overtakers = state.players.filter(p => p.total > prevMax && !prevLeaders.includes(p));
                if (overtakers.length > 0) {
                    prevLeaders.forEach(leader => {
                        leader.total = 0;
                        resetsThisMatch.push(leader.id);
                    });
                }
            }

            let currentTotals = {};
            state.players.forEach(p => currentTotals[p.id] = p.total);

            let oldStreak = { ...state.lowestStreak };

            state.matchHistory.push({ 
                inputs: inputs, 
                resets: resetsThisMatch, 
                totalsAfter: currentTotals,
                oldStreak: oldStreak 
            });

            let mendoIdThisRound = updateStreak(inputs);
            state.matchHistory[state.matchHistory.length - 1].mendoId = mendoIdThisRound;

            // CEK STREAK 10 UNTUK SELESAI
            if (state.lowestStreak.count >= 10) {
                triggerGameEnd('rule2', state.lowestStreak.playerId);
                return;
            }

            // CEK STREAK 5 UNTUK MODAL WARNING (DENGAN AVATAR)
            if (state.lowestStreak.count === 5) {
                const streakPlayer = state.players.find(p => p.id === state.lowestStreak.playerId);
                showModal(
                    'TERLALU MENDO', 
                    `${streakPlayer.name} sudah MENDO selama 5 kali berturut-turut! Hampir CENGOH!`, 
                    'alert',
                    null,
                    streakPlayer.avatar
                );
            }

            // CEK LIMIT POIN
            let hitLimit = state.players.find(p => p.total >= 1500 || p.total <= -1500);
            if (hitLimit) {
                triggerGameEnd('rule3');
                return;
            }

            renderGame();
            animateChanges(inputs, resetsThisMatch);

            if (isKobongTriggered) {
                document.getElementById('joker-text').textContent = `Selamat ${kobongPlayers.join(' & ')}, Anda Kobong Yoker!`;
                document.getElementById('joker-overlay').style.display = 'flex';
            }
        }

        function updateStreak(inputs) {
            let currentMin = Math.min(...state.players.map(p => p.total));
            let tiedPlayers = state.players.filter(p => p.total === currentMin);
            let lowestId = null;

            if (tiedPlayers.length === 1) {
                // Jika hanya 1 orang poin terendah, dia langsung dapat Mendo
                lowestId = tiedPlayers[0].id;
            } else {
                // TIE-BREAKER 1: Cari siapa yang input minusnya paling banyak / paling jelek di match ini
                let minInput = Math.min(...tiedPlayers.map(p => inputs[p.id]));
                let tiedByInput = tiedPlayers.filter(p => inputs[p.id] === minInput);

                if (tiedByInput.length === 1) {
                    lowestId = tiedByInput[0].id;
                } else {
                    // TIE-BREAKER 2: Jika inputnya ternyata sama-sama jelek, cek siapa pemegang Mendo sebelumnya
                    if (tiedByInput.find(p => p.id === state.lowestStreak.playerId)) {
                        lowestId = state.lowestStreak.playerId; // Pemegang lama tetap dapat Mendo
                    } else {
                        lowestId = tiedByInput[0].id; // Fallback jika tidak ada (kasus sangat jarang)
                    }
                }
            }

            // Update state hitungan Mendo Streak
            if (state.lowestStreak.playerId === lowestId) {
                state.lowestStreak.count++;
            } else {
                state.lowestStreak.playerId = lowestId;
                state.lowestStreak.count = 1;
            }

            return lowestId; // Kembalikan ID untuk disimpan ke riwayat histori match
        }

        function requestDeleteLastMatch() {
            if (state.matchHistory.length === 0) return;
            showModal(
                'Hapus Match', 
                'Kleru tenan poraaaa?!', 
                'confirm', 
                () => { deleteLastMatchConfirmed(); }
            );
        }

        function deleteLastMatchConfirmed() {
            const lastMatch = state.matchHistory.pop();
            state.players.forEach(p => {
                p.total = p.prevTotals.pop();
                p.minusTotal = p.prevMinusTotals.pop();
            });
            state.lowestStreak = { ...lastMatch.oldStreak };
            renderGame();
        }

        function requestForceEndGame() {
            showModal(
                'Akhiri Game', 
                'Yakin ingin mengakhiri game sekarang?', 
                'confirm', 
                () => { triggerGameEnd('manual'); }
            );
        }

        function triggerGameEnd(reason, rule2LoserId = null) {
            state.screen = 'result';
            state.endReason = reason;
            
            let sortedByTotal = [...state.players].sort((a, b) => {
                if (b.total !== a.total) return b.total - a.total; 
                return a.minusTotal - b.minusTotal;
            });

            let sortedByMinus = [...state.players].sort((a, b) => {
                return b.minusTotal - a.minusTotal; 
            });

            if (reason === 'rule2') {
                state.loser = state.players.find(p => p.id === rule2LoserId);
                state.winner = sortedByTotal[0].id === state.loser.id ? sortedByTotal[1] : sortedByTotal[0];
            } else {
                state.winner = sortedByTotal[0]; 
                state.loser = sortedByMinus[0];
                if (state.winner.id === state.loser.id) {
                    state.loser = sortedByMinus[1];
                }
            }
            render();
        }

        function renderResult() {
            let reasonText = state.endReason === 'rule2' ? "🎯 Rule 2: Bertahan di posisi MENDO 10 match!" : 
                             state.endReason === 'rule3' ? "🏁 Rule 3: Limit ±1500 poin tercapai!" : "Game selesai manual.";
            
            let finalStandings = [...state.players].sort((a, b) => {
                if (b.total !== a.total) return b.total - a.total;
                return a.minusTotal - b.minusTotal;
            });

            app.innerHTML = `
                <div class="card" style="text-align: center;">
                    <h1>Hasil Akhir</h1>
                    <div style="background: #f3f4f6; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
                        <p style="font-size: 13px; font-weight: bold; margin: 0;">${reasonText}</p>
                    </div>

                    <div style="margin-bottom: 25px; display: flex; gap: 10px; justify-content: center;">
                        <div style="flex: 1; background: #ecfdf5; border: 1px solid #10b981; border-radius: 8px; padding: 15px;">
                            <img src="${state.winner.avatar}" style="width: 50px; height: 50px; border-radius: 50%; margin: 5px auto; border: 2px solid #10b981;" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(state.winner.name)}&background=random&color=fff&size=100'">
                            <div style="font-weight: bold; color: #10b981; font-size: 14px;">HOKI</div>
                            <div style="font-size: 18px; font-weight: 900; color: #065f46;">${state.winner.name}</div>
                        </div>
                        <div style="flex: 1; background: #fef2f2; border: 1px solid #ef4444; border-radius: 8px; padding: 15px;">
                            <img src="${state.loser.avatar}" style="width: 50px; height: 50px; border-radius: 50%; margin: 5px auto; border: 2px solid #ef4444;" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(state.loser.name)}&background=random&color=fff&size=100'">
                            <div style="font-weight: bold; color: #ef4444; font-size: 14px;">CENGOH</div>
                            <div style="font-size: 18px; font-weight: 900; color: #991b1b;">${state.loser.name}</div>
                        </div>
                    </div>

                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>Pemain</th>
                                <th style="text-align: center;">Poin Akhir</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${finalStandings.map(p => {
                                let cls = p.id === state.winner.id ? "highlight-win" : p.id === state.loser.id ? "highlight-lose" : "";
                                return `<tr class="${cls}">
                                    <td style="font-weight: bold;">${p.name}</td>
                                    <td style="text-align: center; font-weight: 900; font-size: 22px;">${p.total}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                    <button type="button" onclick="location.reload()">Mulai Game Baru</button>

                    ${state.matchHistory.length > 0 ? `
                        <div style="margin-top: 30px; text-align: left; border-top: 2px dashed var(--border); padding-top: 20px;">
                            <h3 style="font-size: 16px; margin-bottom: 15px; text-align: center; color: var(--text-muted);">Rekap Perjalanan Poin</h3>
                            <div style="overflow-x: auto;">
                                <table class="result-table" style="font-size: 13px; margin-bottom: 0;">
                                    <thead>
                                        <tr>
                                            <th style="text-align: center; width: 40px; padding: 8px 4px;">#</th>
                                            ${state.players.map(p => `<th style="text-align: center; padding: 8px 4px;">${p.name}</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${state.matchHistory.map((m, i) => `
                                            <tr>
                                                <td style="text-align: center; color: var(--text-muted); font-weight: bold; padding: 8px 4px;">${i + 1}</td>
                                                ${state.players.map(p => {
                                                    let val = m.inputs[p.id];
                                                    let isReset = m.resets && m.resets.includes(p.id);
                                                    let colorClass = val > 0 ? 'text-green' : (val < 0 ? 'text-red' : '');
                                                    let displayVal = val > 0 ? '+' + val : val;
                                                    return `
                                                    <td style="text-align: center; padding: 8px 4px;">
                                                        <span class="${colorClass}" style="font-weight: bold;">${displayVal}</span>
                                                        ${isReset ? '<br><span class="text-reset">RESET</span>' : ''}
                                                    </td>
                                                    `;
                                                }).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function animateChanges(inputs, resets) {
            state.players.forEach(p => {
                let changeEl = document.getElementById(`change-${p.id}`);
                let scoreEl = document.getElementById(`score-${p.id}`);
                if (resets.includes(p.id)) {
                    if(changeEl) changeEl.innerHTML = `<span class="text-red">RESET!</span>`;
                } else if (inputs[p.id] !== 0) {
                    let isPos = inputs[p.id] > 0;
                    if(changeEl) changeEl.innerHTML = `<span class="${isPos ? 'text-green' : 'text-red'}">${isPos ? '+' : ''}${inputs[p.id]}</span>`;
                }
                
                if (scoreEl) {
                    scoreEl.classList.remove('animate-pop');
                    void scoreEl.offsetWidth; 
                    scoreEl.classList.add('animate-pop');
                }
                setTimeout(() => { 
                    if(changeEl) changeEl.innerHTML = ''; 
                    if(scoreEl) scoreEl.classList.remove('animate-pop'); 
                }, 1500);
            });
        }

        render();
    </script>
</body>
</html>
